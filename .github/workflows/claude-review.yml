name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**'
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine review context
        id: context
        run: |
          if [ "${{ github.event.action }}" = "synchronize" ]; then
            echo "is_incremental=true" >> $GITHUB_OUTPUT
            echo "before_sha=${{ github.event.before }}" >> $GITHUB_OUTPUT
          else
            echo "is_incremental=false" >> $GITHUB_OUTPUT
            echo "before_sha=" >> $GITHUB_OUTPUT
          fi

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-haiku-4-5-20251001"
          show_full_output: true
          pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
          prompt: |
            PR #${{ github.event.pull_request.number || github.event.issue.number }}을 코드 리뷰하세요.
            리뷰 모드: ${{ steps.context.outputs.is_incremental == 'true' && '증분 리뷰' || '전체 리뷰' }}
            ${{ steps.context.outputs.is_incremental == 'true' && format('이전 커밋 SHA: {0}', steps.context.outputs.before_sha) || '' }}

            ---

            ## 전체 리뷰 모드 (리뷰 모드가 "전체 리뷰"인 경우)
            1. `gh pr diff ${{ github.event.pull_request.number || github.event.issue.number }} --stat`으로 변경 파일 목록 확인
            2. lock 파일(pnpm-lock.yaml), .claude/, docs/ 제외
            3. src/ 파일만 `git diff develop -- <파일>`로 개별 읽기
            4. 전체 diff를 한번에 읽지 말 것

            ## 증분 리뷰 모드 (리뷰 모드가 "증분 리뷰"인 경우)
            1. `git diff ${{ steps.context.outputs.before_sha }}..HEAD --stat`으로 새 변경 파일 확인
            2. src/ 파일만 `git diff ${{ steps.context.outputs.before_sha }}..HEAD -- <파일>`로 개별 읽기
            3. `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number || github.event.issue.number }}/reviews --jq '.[-1].body'`로 가장 최근 리뷰 본문 조회
            4. 이전 리뷰에서 지적된 이슈가 이번 커밋에서 해결되었는지 검증
            5. 새 코드에서 추가 이슈 확인
            6. `git diff` 실패 시 전체 리뷰 모드로 fallback

            ## 리뷰 본문 형식 (반드시 이 템플릿을 따를 것)

            전체 리뷰 본문 형식:
            ```
            ## 코드 리뷰

            ### 요약
            (1~2문장으로 전체 변경 사항 요약)

            ### ✅ 잘된 점
            (좋은 코드, 패턴, 설계 결정 등 긍정적인 측면 1~3개)

            ### 이슈
            (이슈가 없으면 "발견된 이슈 없음" 으로 표기)

            #### 🔴 Critical (머지 차단)
            - `파일명:라인` — 설명

            #### 🟡 Important (수정 권장)
            - `파일명:라인` — 설명

            #### 🔵 Suggestion (선택)
            - `파일명:라인` — 설명

            ### 판정
            ✅ APPROVED 또는 ❌ CHANGES REQUESTED (사유)
            ```

            증분 리뷰 본문 형식:
            ```
            ## 증분 리뷰 (이전 리뷰 대비)

            ### 이전 이슈 해결 상태
            - [x] 이슈1: 해결됨
            - [ ] 이슈2: 미해결 — 설명

            ### 새로운 이슈
            (위와 동일한 🔴/🟡/🔵 등급 형식)

            ### 판정
            ✅ APPROVED 또는 ❌ CHANGES REQUESTED (사유)
            ```

            ## 리뷰 기준
            - **🔴 Critical**: 버그, 보안 취약점, 데이터 손실 위험, 빌드 실패
            - **🟡 Important**: 성능 이슈, 타입 안전성, 에러 핸들링 누락, 컨벤션 위반
            - **🔵 Suggestion**: 네이밍 개선, 코드 스타일, 리팩토링 제안
            - 발견한 이슈는 반드시 `파일명:라인` 형식으로 위치 명시
            - 🔵만 있으면 APPROVE, 🔴가 하나라도 있으면 CHANGES REQUESTED

            ## 판정 및 게시 (필수)

            - APPROVED:
              `gh pr review ${{ github.event.pull_request.number || github.event.issue.number }} --approve --body "리뷰 내용"`

            - CHANGES REQUESTED:
              `gh pr review ${{ github.event.pull_request.number || github.event.issue.number }} --request-changes --body "리뷰 내용"`

            반드시 `gh pr review`를 실행해야 합니다 — `gh pr comment`가 아닙니다.

            ## 금지 사항
            - 메모리 저장/설정 작업 금지
            - 전체 diff를 한번에 읽기 금지
            - `gh pr comment` 사용 금지

            ## 응답 규칙
            - 한국어 작성 (기술 용어/코드 식별자는 원문 유지)
            - 리뷰 본문 마지막에 포함: 📊 **토큰 사용량**: 입력 토큰 약 N개 / 출력 토큰 약 N개
