name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/screenshots/**'
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop branch
        run: git fetch origin develop:refs/remotes/origin/develop || true

      - name: Determine review context
        id: context
        run: |
          if [ "${{ github.event.action }}" = "synchronize" ]; then
            echo "is_incremental=true" >> $GITHUB_OUTPUT
            echo "before_sha=${{ github.event.before }}" >> $GITHUB_OUTPUT
          else
            echo "is_incremental=false" >> $GITHUB_OUTPUT
            echo "before_sha=" >> $GITHUB_OUTPUT
          fi

      - name: Claude Code Action
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-haiku-4-5-20251001"
          show_full_output: true
          prompt: |
            이 PR을 코드 리뷰하세요.
            리뷰 모드: ${{ steps.context.outputs.is_incremental == 'true' && '증분 리뷰' || '전체 리뷰' }}
            ${{ steps.context.outputs.is_incremental == 'true' && format('이전 커밋 SHA: {0}', steps.context.outputs.before_sha) || '' }}

            ---

            ## 전체 리뷰 모드 (리뷰 모드가 "전체 리뷰"인 경우)
            0. `gh pr view ${{ github.event.pull_request.number }} --json title,body --jq '"\(.title)\n\(.body)"'`로 PR 제목과 본문을 읽고, 변경의 목적과 맥락을 파악
            1. `git diff origin/develop --name-only`으로 변경 파일 목록 확인
            2. 다음 파일/디렉토리는 리뷰에서 제외:
               - `pnpm-lock.yaml`, `package.json`
               - `.github/screenshots/*`, `.github/workflows/*`
               - `apps/web/src/components/ui/*` (shadcn/ui 보일러플레이트)
               - `.claude/`, `docs/`
            3. 필터링된 파일만 `git diff origin/develop -- <파일>`로 개별 읽기
            4. 전체 diff를 한번에 읽지 말 것

            ## 증분 리뷰 모드 (리뷰 모드가 "증분 리뷰"인 경우)
            1. `git diff ${{ steps.context.outputs.before_sha }}..HEAD --name-only`으로 새 변경 파일 확인
            2. 위와 동일한 제외 목록을 적용한 뒤, `git diff ${{ steps.context.outputs.before_sha }}..HEAD -- <파일>`로 개별 읽기
            3. `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews --jq '.[-1]'`로 가장 최근 리뷰의 본문(`body`)과 작성 시각(`submitted_at`) 조회
            4. `gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq '[.[] | select(.created_at > "LAST_REVIEW_SUBMITTED_AT")]'`로 마지막 리뷰 이후 PR 코멘트 조회. 코멘트가 있으면 사용자의 반박/설명으로 간주하고 리뷰에 반영
            5. 이전 리뷰에서 지적된 이슈 중 **이번 diff에 포함된 파일의 이슈만** 해결 여부 검증. diff에 포함되지 않은 파일의 이슈는 "해당 파일 미변경"으로 표기. 사용자가 코멘트로 반박한 이슈는 반박 내용을 검토하여 수용 여부 판단
            6. **반드시 diff에 포함된 파일만 리뷰**. diff 외 파일을 읽거나 리뷰하지 말 것
            7. `git diff` 실패 시 전체 리뷰 모드로 fallback

            ## 리뷰 본문 형식 (반드시 이 템플릿을 따를 것)

            전체 리뷰 본문은 아래 섹션 순서를 반드시 따른다:

            1) "## 코드 리뷰" 제목
            2) "### 요약" — 1~2문장으로 전체 변경 사항 요약
            3) "### ✅ 잘된 점" — 좋은 코드, 패턴, 설계 결정 등 1~3개
            4) "### 이슈" — 이슈가 없으면 "발견된 이슈 없음"으로 표기. 있으면 아래 등급별로 분류:
               - "#### 🔴 Critical (머지 차단)" 항목들
               - "#### 🟡 Important (수정 권장)" 항목들
               - "#### 🔵 Suggestion (선택)" 항목들
               - 각 항목 형식: "- `파일명:라인` — 설명". 코드 예시가 필요하면 코드블럭 사용 가능
            5) "### 판정" — "✅ APPROVED" 또는 "❌ CHANGES REQUESTED (사유)"

            증분 리뷰 본문은 아래 섹션 순서를 따른다:

            1) "## 증분 리뷰 (이전 리뷰 대비)" 제목
            2) "### 이전 이슈 해결 상태" — 체크박스 형식 (- [x] 해결됨 / - [ ] 미해결)
            3) "### 새로운 이슈" — 위와 동일한 🔴/🟡/🔵 등급 형식
            4) "### 판정" — "✅ APPROVED" 또는 "❌ CHANGES REQUESTED (사유)"

            ## 리뷰 기준
            - **🔴 Critical**: 버그, 보안 취약점, 데이터 손실 위험, 빌드 실패
            - **🟡 Important**: 성능 이슈, 타입 안전성, 에러 핸들링 누락, 컨벤션 위반
            - **🔵 Suggestion**: 네이밍 개선, 코드 스타일, 리팩토링 제안
            - **로직과 동작**에 집중하고, 문법·API·라이브러리 사용법이 틀렸다고 **확신할 수 없으면** 이슈로 제기하지 말 것. 프로젝트가 최신 버전 라이브러리를 사용하므로 본인이 모르는 문법이 유효할 수 있음
            - 발견한 이슈는 반드시 `파일명:라인` 형식으로 위치 명시
            - 🔵만 있으면 APPROVE, 🔴가 하나라도 있으면 CHANGES REQUESTED

            ## 출력
            리뷰 결과를 위 형식에 맞게 텍스트로 출력하세요.
            판정 섹션에는 반드시 "APPROVED" 또는 "CHANGES REQUESTED" 영문 키워드를 포함해야 합니다.
            (예: "✅ APPROVED", "❌ CHANGES REQUESTED — 사유")
            gh pr review, gh pr comment 등 직접 게시 명령을 실행하지 마세요.

            ## 금지 사항
            - 메모리 저장/설정 작업 금지
            - 전체 diff를 한번에 읽기 금지
            - `gh pr review`, `gh pr comment` 등 직접 게시 명령 실행 금지
            - `apps/web/src/components/ui/*` 파일 리뷰 금지 (shadcn/ui 보일러플레이트)
            - `.github/screenshots/*` 파일 읽기 금지 (바이너리)
            - diff에 포함되지 않은 파일에 대한 이슈 제기 금지 — PR 범위 밖 코드는 리뷰 대상이 아님

            ## 응답 규칙
            - 한국어 작성 (기술 용어/코드 식별자는 원문 유지)
            - 리뷰 본문 마지막에 포함: 📊 **토큰 사용량**: 입력 토큰 약 N개 / 출력 토큰 약 N개

      - name: Submit review decision
        if: github.event_name == 'pull_request'
        env:
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "::error::Claude Code Action의 execution_file output이 없습니다"
            exit 1
          fi

          # python 스크립트로 result 추출 + verdict 판정
          cat > /tmp/parse_review.py << 'PYEOF'
          import json, sys

          with open(sys.argv[1]) as f:
              data = json.load(f)

          # list인 경우 마지막 result 항목 찾기
          if isinstance(data, list):
              for item in reversed(data):
                  if isinstance(item, dict) and item.get("result"):
                      data = item
                      break
              else:
                  print("::error::execution_file에서 result를 찾을 수 없습니다", file=sys.stderr)
                  sys.exit(1)

          result = data.get("result", "") if isinstance(data, dict) else ""
          if not result:
              print("::error::리뷰 결과(result)가 비어있습니다", file=sys.stderr)
              sys.exit(1)

          with open("/tmp/review-body.md", "w") as out:
              out.write(result)

          if "CHANGES_REQUESTED" in result or "CHANGES REQUESTED" in result:
              print("CHANGES_REQUESTED")
          elif "APPROVED" in result:
              print("APPROVED")
          else:
              print("COMMENT")
          PYEOF

          VERDICT=$(python3 /tmp/parse_review.py "$EXECUTION_FILE")
          if [ $? -ne 0 ]; then
            exit 1
          fi

          echo "Verdict: $VERDICT"

          if [ "$VERDICT" = "APPROVED" ]; then
            gh pr review "$PR_NUMBER" --approve --body-file /tmp/review-body.md
          elif [ "$VERDICT" = "CHANGES_REQUESTED" ]; then
            gh pr review "$PR_NUMBER" --request-changes --body-file /tmp/review-body.md
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/review-body.md
          fi
