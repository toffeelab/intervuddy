name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**'
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-haiku-4-5-20251001"
          show_full_output: true
          prompt: |
            이 PR의 변경사항을 코드 리뷰해주세요. 반드시 다음을 수행하세요:

            1. PR의 diff를 분석하고, 코드 품질/버그/보안/성능 이슈를 찾아주세요
            2. 발견한 이슈는 해당 파일과 라인을 명시하여 구체적으로 설명해주세요
            3. 이슈가 없으면 승인(approve) 의견을 남겨주세요
            4. 메모리 저장이나 설정 작업은 하지 마세요 — 코드 리뷰만 수행하세요

            응답 규칙:
            - 모든 리뷰와 응답은 반드시 한국어로 작성
            - 기술 용어와 코드 식별자는 원문 그대로 유지
            - 리뷰 마지막에 토큰 사용량 표시:
              📊 **토큰 사용량**: 입력 토큰 약 N개 / 출력 토큰 약 N개
