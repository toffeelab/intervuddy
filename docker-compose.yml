services:
  db:
    image: postgres:17-alpine
    container_name: intervuddy-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: intervuddy
      POSTGRES_USER: intervuddy
      POSTGRES_PASSWORD: intervuddy
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'intervuddy']
      interval: 10s
      timeout: 5s
      retries: 5

  # 선택: 로컬 개발 시에는 pnpm --filter @intervuddy/server dev 를 직접 실행하는 것이 더 편리
  # Docker로 실행이 필요할 때만 사용
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: intervuddy-server
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://intervuddy:intervuddy@db:5432/intervuddy
      JWT_SECRET: dev-jwt-secret-change-in-production
      WEB_URL: http://localhost:3000
      PORT: '4000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
